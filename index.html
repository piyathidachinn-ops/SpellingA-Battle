<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Host Dashboard - สำหรับโปรเจกเตอร์</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background: #2D3436; color: white; text-align: center; padding: 20px; margin: 0; overflow: hidden; }
        .header { background: #6C5CE7; padding: 20px; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        h1 { font-size: 3rem; color: #F1C40F; margin: 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        
        .main-layout { display: flex; justify-content: center; align-items: flex-start; gap: 40px; padding: 0 40px; }
        
        /* ฝั่ง QR Code */
        .qr-section { background: white; padding: 30px; border-radius: 30px; color: #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); min-width: 350px; }
        .qr-section h2 { margin-top: 0; color: #6C5CE7; font-size: 1.8rem; }
        #qr-img { width: 280px; height: 280px; }
        .url-display { font-size: 0.9rem; color: #666; margin-top: 15px; word-break: break-all; background: #eee; padding: 10px; border-radius: 10px; }

        /* ฝั่งตารางคะแนน */
        .rank-section { flex: 1; max-width: 700px; height: 75vh; overflow-y: auto; padding-right: 10px; }
        .rank-card { 
            background: rgba(255,255,255,0.1); margin-bottom: 15px; padding: 20px 30px; 
            border-radius: 20px; display: flex; justify-content: space-between; align-items: center;
            font-size: 2rem; border-left: 12px solid #6C5CE7; transition: 0.3s;
            animation: slideIn 0.5s ease-out;
        }
        .rank-card:nth-child(1) { border-left-color: #F1C40F; background: rgba(241, 196, 15, 0.2); transform: scale(1.05); }
        .rank-card:nth-child(2) { border-left-color: #BDC3C7; }
        .rank-card:nth-child(3) { border-left-color: #E67E22; }

        @keyframes slideIn { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }
        
        /* สไตล์ Scrollbar */
        .rank-section::-webkit-scrollbar { width: 8px; }
        .rank-section::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        .rank-section::-webkit-scrollbar-thumb { background: #6C5CE7; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🏆 อันดับยอดฝีมือประสมคำ</h1>
    </div>

    <div class="main-layout">
        <div class="qr-section">
            <h2>สแกนเพื่อเข้าแข่ง!</h2>
            <img id="qr-img" src="" alt="QR Code">
            <div class="url-display" id="url-text">กำลังโหลดลิงก์...</div>
            <p style="margin-top:15px; font-weight:bold; color:#6C5CE7;">เตรียมมือถือให้พร้อม!</p>
        </div>

        <div class="rank-section" id="rank-container">
            <p style="font-size: 1.5rem; color: #ccc; margin-top: 50px;">ยังไม่มีผู้เล่นเข้าสู่สนาม...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // --- 1. ใส่ Firebase Config ของคุณ ---
        const firebaseConfig = {
            apiKey: "AIzaSyBCAQ419Q9U77SVOiTeC7_jfyfoDv258BE",
            authDomain: "spellinga-605bc.firebaseapp.com",
            databaseURL: "https://spellinga-605bc-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "spellinga-605bc",
            storageBucket: "spellinga-605bc.firebasestorage.app",
            messagingSenderId: "976514389506",
            appId: "1:976514389506:web:5cb312d0f31eaed7a1f91b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const roomId = "battle_room_1";

        // --- 2. แก้ไข URL ตรงนี้ให้เป็นลิงก์ GitHub Pages ของคุณ (หน้า index.html) ---
        // ตัวอย่าง: "https://yourname.github.io/your-project/index.html"
        const playerUrl = "https://github.com/piyathidachinn-ops/SpellingA-Battle/edit/main/index.html"; // <--- แก้ไขตรงนี้

        // ฟังก์ชันแสดง QR Code ที่ถูกต้อง
        window.onload = () => {
            const qrImg = document.getElementById('qr-img');
            const urlText = document.getElementById('url-text');
            
            // สร้าง QR ชี้ไปที่หน้าเล่นเกมบนเว็บ
            qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(playerUrl)}`;
            urlText.innerText = playerUrl;
        };

        // --- 3. ระบบดึงคะแนน Real-time ---
        onValue(ref(db, `rooms/${roomId}/players`), (snapshot) => {
            const data = snapshot.val();
            const container = document.getElementById('rank-container');
            
            if (!data) {
                container.innerHTML = '<p style="font-size: 1.5rem; color: #ccc; margin-top: 50px;">กำลังรอผู้เล่นคนแรก...</p>';
                return;
            }

            // เรียงลำดับคะแนนจากมากไปน้อย
            const sorted = Object.entries(data).sort((a, b) => b[1].score - a[1].score);
            
            container.innerHTML = sorted.map(([name, info], idx) => {
                let medal = idx === 0 ? "🥇" : idx === 1 ? "🥈" : idx === 2 ? "🥉" : `${idx + 1}.`;
                return `
                    <div class="rank-card">
                        <span>${medal} ${name}</span>
                        <span style="font-weight:bold; color:#F1C40F;">${info.score} <small style="font-size:1rem; color:white;">แต้ม</small></span>
                    </div>
                `;
            }).join('');
        });
    </script>
</body>
</html>
